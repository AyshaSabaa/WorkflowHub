services:
  postgres:
    image: postgres:17-alpine
    container_name: workflow-hub-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workflow_hub
    volumes:
      - workflow_hub_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workflow_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  workflow_hub_data:
